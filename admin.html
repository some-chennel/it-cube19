<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IT-куб</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- шапка -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="https://itcube24.ru/static/assets/img/logo-it.png" alt="Логотип"></a>
                <span>IT-CUBE</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="active">Главная</a>
                <a href="directions.html">Направления</a>
                <a href="profile.html">Профиль</a>
                <a href="login.html">Войти</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
                    <img src="img/moon1.svg" alt="Тёмная тема" id="themeIcon" width="24" height="24">
                </button>
            </nav>
            <button class="mobile-menu-btn">☰</button>
        </div>
    </header>

    <!-- шапка админ-панели с данными -->
    <main>
        <div class="container">
            <header class="admin-header">
                <div class="logo">IT-куб</div>
                <div class="stats">
                    <div class="stat"><span class="stat-value" id="newCount">0</span><span
                            class="stat-label">Новое</span>
                    </div>
                    <div class="stat"><span class="stat-value" id="confirmedCount">0</span><span
                            class="stat-label">Подтвержденное</span></div>
                    <div class="stat"><span class="stat-value" id="rejectedCount">0</span><span
                            class="stat-label">Отклоненное</span></div>
                    <div class="stat"><span class="stat-value" id="totalCount">0</span><span class="stat-label">Всего
                            заявок</span></div>
                </div>
            </header>

            <!-- сортировка -->
            <div class="filter-bar">
                <select id="statusFilter" label="Фильтр по статусу">
                    <option value="all">Все статусы</option>
                    <option value="new">Новые</option>
                    <option value="confirmed">Подтвержденные</option>
                    <option value="rejected">Отклоненные</option>
                </select>
            </div>

            <!-- таблица -->
            <div class="table-wrapper">
                <table class="applications-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Телефон</th>
                            <th>Email</th>
                            <th>Направление</th>
                            <th>Дата</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTable"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/script.js">
    </script>
</body>

</html>
