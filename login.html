<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- шапка -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="https://itcube24.ru/static/assets/img/logo-it.png" alt="Логотип"></a>
                <span>IT-CUBE</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="active">Главная</a>
                <a href="directions.html">Направления</a>
                <a href="profile.html">Профиль</a>
                <a href="login.html">Войти</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
                    <img src="img/moon1.svg" alt="Тёмная тема" id="themeIcon" width="24" height="24">
                </button>
            </nav>
            <button class="mobile-menu-btn">☰</button>
        </div>
    </header>

    <!-- основной контент -->
    <main class="form-page">
        <div class="form-card">
            <div class="form-title">Вход в личный кабинет</div>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" class="input-field" id="login" placeholder="Логин">
                </div>
                <div class="input-group">
                    <input type="password" class="input-field" id="password" placeholder="Пароль">
                </div>
                <div class="error-text" id="errorText">Неверный логин или пароль</div>
                <button type="submit" class="btn-submit">Войти</button>
            </form>
        </div>
    </main>

    <!-- подвал -->
    <footer class="footer-new">
        <div class="container">
            <div class="footer-brand">
                <h3 class="footer-brand-logo">IT-CUBE</h3>
                <p class="footer-brand-copy">© 2026. Все права защищены.</p>
            </div>
            <div class="footer-docs">
                <a href="#">Документы</a>
                <a href="#">Согласие на обработку персональных данных</a>
                <a href="#">Политика конфиденциальности</a>
            </div>
            <div class="footer-logos">
                <div class="footer-logo-item">
                    <img src="img/natsproekt.png" alt="ХПК">
                </div>
                <div class="footer-logo-item">
                    <img src="img/perviekhpk.png" alt="Движение 1">
                </div>
            </div>
        </div>
    </footer>

    <script src="js/script.js">
    </script>
</body>

</html>
